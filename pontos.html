    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #1a1a1a;
            --bg-secondary: #242424;
            --bg-tertiary: #2e2e2e;
            --bg-hover: #323232;
            --accent: #c9a96e;
            --accent-hover: #d4b57f;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --text-muted: #8a8a8a;
            --border: #3a3a3a;
            --border-light: #2e2e2e;
        }
        
        body {
            font-family: 'Archivo', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        
        ::selection {
            background: var(--accent);
            color: var(--bg-primary);
        }
        
        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            gap: 32px;
        }
        
        .logo-container img {
            height: 48px;
        }
        
        .counter-box {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        
        .total-count {
            font-family: 'Archivo', sans-serif;
            font-size: 32px;
            font-weight: 600;
            color: var(--accent);
            line-height: 1;
        }
        
        .total-label {
            font-family: 'Archivo', sans-serif;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .mini-stats {
            display: flex;
            gap: 24px;
            margin-left: auto;
        }
        
        .mini-stat {
            text-align: center;
        }
        
        .mini-stat-number {
            font-family: 'Archivo', sans-serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1;
        }
        
        .mini-stat-label {
            font-family: 'Archivo', sans-serif;
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 4px;
        }
        
        .theme-toggle {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .theme-toggle:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
        }
        
        /* Navigation/Filters */
        .nav {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0 40px;
            display: flex;
            gap: 24px;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        
        .nav::-webkit-scrollbar {
            height: 6px;
        }
        
        .nav::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .nav::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        
        .filter-group {
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 12px 0;
        }
        
        .filter-label {
            font-family: 'Archivo', sans-serif;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
            margin-right: 8px;
        }
        
        .filter-btn {
            font-family: 'Archivo', sans-serif;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .filter-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        
        .filter-btn.active {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }
        
        /* Main Content */
        .main {
            max-width: 1600px;
            margin: 0 auto;
            padding: 32px 40px;
        }
        
        .stage-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 24px;
        }
        
        .stage-header {
            padding: 20px 28px;
            background: linear-gradient(135deg, var(--bg-tertiary) 0%, var(--bg-secondary) 100%);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .stage-name {
            font-family: 'Archivo', sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .stage-count {
            font-family: 'Archivo', sans-serif;
            background: var(--accent);
            color: var(--bg-primary);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .channels-container {
            padding: 20px 28px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 28px;
        }
        
        .channel-group {
            background: transparent;
        }
        
        .channel-header {
            font-family: 'Archivo', sans-serif;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-light);
        }
        
        .touchpoints-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .touchpoint {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-light);
            border-radius: 6px;
            padding: 12px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        
        .touchpoint:hover {
            background: var(--bg-hover);
            border-color: var(--border);
        }
        
        .touchpoint-name {
            font-family: 'Archivo', sans-serif;
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 400;
        }
        
        .touchpoint-tags {
            display: flex;
            gap: 6px;
        }
        
        .tag {
            font-size: 14px;
            opacity: 0.7;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-wrap: wrap;
                padding: 16px 20px;
            }
            
            .mini-stats {
                width: 100%;
                justify-content: space-around;
            }
            
            .nav {
                padding: 0 20px;
                gap: 12px;
            }
            
            .filter-group {
                gap: 6px;
                padding: 16px 0;
            }
            
            .filter-label {
                display: none;
            }
            
            .filter-btn {
                padding: 8px 16px;
                font-size: 14px;
            }
            
            .main {
                padding: 20px;
            }
            
            .channels-container {
                grid-template-columns: 1fr;
                padding: 16px 20px;
            }
            
            .stage-header {
                padding: 16px 20px;
            }
        }
    </style>
</head>

        </div>
    </div>

        // Parse dos dados
        function parseData() {
            const lines = rawData.trim().split('\n').slice(1); // Remove header
            const structure = {};
            
            lines.forEach(line => {
                const parts = line.split('\t');
                const stage = parts[0];
                const channel = parts[1];
                const asset = parts[2];
                const identity = parts[3];
                
                // Normalizar identidade
                let identityNorm = 'both';
                if (identity.trim() === 'Visual') identityNorm = 'visual';
                else if (identity.trim() === 'Verbal') identityNorm = 'verbal';
                else if (identity.trim() === 'Verbal + Visual') identityNorm = 'both';
                
                if (!structure[stage]) {
                    structure[stage] = {};
                }
                
                if (!structure[stage][channel]) {
                    structure[stage][channel] = [];
                }
                
                structure[stage][channel].push({
                    name: asset,
                    identity: identityNorm
                });
            });
            
            return structure;
        }
        
        const data = parseData();
        console.log('Dados carregados:', data);
        console.log('Total de etapas:', Object.keys(data).length);
        let filters = { stage: 'all', identity: 'all' };
        
        function handleFilterClick(e) {
            const btn = e.target;
            const filterType = btn.dataset.filter;
            const value = btn.dataset.value;
            
            filters[filterType] = value;
            
            document.querySelectorAll(`[data-filter="${filterType}"]`).forEach(b => {
                b.classList.remove('active');
            });
            btn.classList.add('active');
            
            render();
        }
        
        function toggleTheme() {
            alert('Theme toggle coming soon');
        }
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', handleFilterClick);
        });
        
        function filterTouchpoint(tp) {
            if (filters.identity !== 'all' && tp.identity !== filters.identity) return false;
            return true;
        }
        
        function render() {
            const container = document.getElementById('stagesContainer');
            container.innerHTML = '';
            
            let totalVisible = 0;
            
            Object.keys(data).forEach(stage => {
                if (filters.stage !== 'all' && stage !== filters.stage) return;
                
                const channels = data[stage];
                let stageHtml = '';
                let stageCount = 0;
                
                Object.keys(channels).forEach(channelName => {
                    const touchpoints = channels[channelName].filter(filterTouchpoint);
                    if (touchpoints.length === 0) return;
                    
                    stageCount += touchpoints.length;
                    
                    stageHtml += `
                        <div class="channel-group">
                            <div class="channel-header">${channelName}</div>
                            <div class="touchpoints-grid">
                                ${touchpoints.map(tp => `
                                    <div class="touchpoint">
                                        <div class="touchpoint-name">${tp.name}</div>
                                        <div class="touchpoint-tags">
                                            ${tp.identity === 'visual' ? '<span class="tag">👁️</span>' : ''}
                                            ${tp.identity === 'verbal' ? '<span class="tag">🔊</span>' : ''}
                                            ${tp.identity === 'both' ? '<span class="tag">👁️</span><span class="tag">🔊</span>' : ''}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });
                
                if (stageCount > 0) {
                    totalVisible += stageCount;
                    container.innerHTML += `
                        <div class="stage-card">
                            <div class="stage-header">
                                <div class="stage-name">${stage}</div>
                                <div class="stage-count">${stageCount}</div>
                            </div>
                            <div class="channels-container">
                                ${stageHtml}
                            </div>
                        </div>
                    `;
                }
            });
            
            document.getElementById('totalCount').textContent = totalVisible;
            updateStats();
        }
        
        function updateStats() {
            let visualCount = 0;
            let verbalCount = 0;
            let bothCount = 0;
            
            Object.keys(data).forEach(stage => {
                Object.keys(data[stage]).forEach(channel => {
                    data[stage][channel].forEach(tp => {
                        if (tp.identity === 'visual') visualCount++;
                        else if (tp.identity === 'verbal') verbalCount++;
                        else if (tp.identity === 'both') bothCount++;
                    });
                });
            });
            
            document.getElementById('stagesCount').textContent = Object.keys(data).length;
            document.getElementById('digitalCount').textContent = visualCount;
            document.getElementById('fisicoCount').textContent = verbalCount;
        }
        
        render();
    </script>
