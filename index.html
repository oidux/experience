<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #fff;
            --bg-secondary: #fafaf8;
            --text-primary: #1a1a1a;
            --text-secondary: #666;
            --gold: #b8860b;
            --gold-bg: #fdf6e3;
            --border: rgba(0,0,0,0.08);
        }
        
        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #242424;
            --text-primary: #f5f5f5;
            --text-secondary: #a0a0a0;
            --gold: #daa520;
            --gold-bg: #3d3417;
            --border: rgba(255,255,255,0.08);
        }
        
        body {
            font-family: 'Archivo', sans-serif;
            background: var(--bg-secondary);
            padding: 1rem;
            transition: background 0.3s;
        }
        
        .container { max-width: 1600px; margin: 0 auto; }
        
        .top-bar {
            background: var(--bg-primary);
            border-radius: 14px;
            padding: 1.5rem 2rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 2rem;
        }
        
        .logo-container img { height: 42px; }
        
        .counter-circle {
            width: 110px;
            height: 110px;
            border-radius: 14px;
            border: 3px solid var(--gold);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .total-count {
            font-size: 48px;
            font-weight: 600;
            color: var(--gold);
            line-height: 1;
        }
        
        .total-label {
            font-size: 9px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            text-align: center;
            margin-top: 4px;
        }
        
        .mini-stats {
            display: flex;
            gap: 2rem;
            flex: 1;
        }
        
        .mini-stat-number {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1;
        }
        
        .mini-stat-label {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 500;
        }
        
        .theme-toggle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: transparent;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
            margin-left: auto;
        }
        
        .theme-toggle:hover {
            background: var(--bg-secondary);
            transform: scale(1.05);
        }
        
        .filters-bar {
            background: var(--bg-primary);
            border-radius: 14px;
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        
        .filter-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        
        .filter-label {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 500;
            margin-right: 0.5rem;
        }
        
        .filter-btn {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-family: 'Archivo';
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .filter-btn:hover {
            background: var(--bg-secondary);
            transform: translateY(-1px);
        }
        
        .filter-btn.active {
            background: var(--gold-bg);
            color: var(--gold);
            border-color: var(--gold);
        }
        
        .stage-card {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        
        .stage-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }
        
        .stage-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .stage-count {
            background: var(--gold-bg);
            color: var(--gold);
            font-size: 11px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 16px;
        }
        
        .channels-container {
            padding: 0.75rem;
        }
        
        .channel-group {
            margin-bottom: 1rem;
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 0.75rem;
            border: 1px solid var(--border);
        }
        
        .channel-group:last-child {
            margin-bottom: 0;
        }
        
        .channel-header {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 0 0.5rem 0.5rem 0.5rem;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }
        
        .touchpoints-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 0;
        }
        
        .touchpoint {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            font-size: 13px;
            color: var(--text-primary);
            transition: all 0.15s;
            border-radius: 6px;
            margin: 2px;
        }
        
        .touchpoint:hover {
            background: var(--bg-primary);
        }
        
        .touchpoint-name {
            flex: 1;
        }
        
        .touchpoint-tags {
            display: flex;
            gap: 4px;
        }
        
        .tag {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .tag-visual {
            background: rgba(99, 102, 241, 0.1);
            color: rgb(99, 102, 241);
        }
        
        .tag-verbal {
            background: rgba(16, 185, 129, 0.1);
            color: rgb(16, 185, 129);
        }
        
        [data-theme="dark"] .tag-visual {
            background: rgba(99, 102, 241, 0.2);
            color: rgb(165, 180, 252);
        }
        
        [data-theme="dark"] .tag-verbal {
            background: rgba(16, 185, 129, 0.2);
            color: rgb(110, 231, 183);
        }
        
        @media (max-width: 1200px) {
            .touchpoints-grid {
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            }
        }
        
        @media (max-width: 768px) {
            body { padding: 1rem; }
            .top-bar { padding: 1.5rem; flex-wrap: wrap; }
            .counter-circle { width: 110px; height: 110px; }
            .total-count { font-size: 42px; }
            .touchpoints-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

        let filters = { stage: 'all', channel: 'all', identity: 'all' };
        
        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.querySelector('.theme-toggle');
            if (html.getAttribute('data-theme') === 'dark') {
                html.removeAttribute('data-theme');
                btn.textContent = '🌙';
            } else {
                html.setAttribute('data-theme', 'dark');
                btn.textContent = '☀️';
            }
        }
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const filterType = btn.dataset.filter;
                const value = btn.dataset.value;
                
                filters[filterType] = value;
                
                document.querySelectorAll(`[data-filter="${filterType}"]`).forEach(b => {
                    b.classList.remove('active');
                });
                btn.classList.add('active');
                
                render();
            });
        });
        
        function filterTouchpoint(tp) {
            if (filters.channel !== 'all' && tp.channel !== filters.channel) return false;
            if (filters.identity !== 'all' && tp.identity !== filters.identity) return false;
            return true;
        }
        
        function render() {
            const container = document.getElementById('stagesContainer');
            container.innerHTML = '';
            
            let totalVisible = 0;
            
            Object.keys(data).forEach(stage => {
                if (filters.stage !== 'all' && stage !== filters.stage) return;
                
                const channels = data[stage];
                let stageHtml = '';
                let stageCount = 0;
                
                Object.keys(channels).forEach(channelName => {
                    const touchpoints = channels[channelName].filter(filterTouchpoint);
                    if (touchpoints.length === 0) return;
                    
                    stageCount += touchpoints.length;
                    
                    stageHtml += `
                        <div class="channel-group">
                            <div class="channel-header">${channelName}</div>
                            <div class="touchpoints-grid">
                                ${touchpoints.map(tp => `
                                    <div class="touchpoint">
                                        <div class="touchpoint-name">${tp.name}</div>
                                        <div class="touchpoint-tags">
                                            ${tp.identity === 'visual' ? '<span class="tag tag-visual">👁️</span>' : ''}
                                            ${tp.identity === 'verbal' ? '<span class="tag tag-verbal">🔊</span>' : ''}
                                            ${tp.identity === 'both' ? '<span class="tag tag-visual">👁️</span><span class="tag tag-verbal">🔊</span>' : ''}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });
                
                if (stageCount > 0) {
                    totalVisible += stageCount;
                    container.innerHTML += `
                        <div class="stage-card">
                            <div class="stage-header">
                                <div class="stage-name">${stage}</div>
                                <div class="stage-count">${stageCount}</div>
                            </div>
                            <div class="channels-container">
                                ${stageHtml}
                            </div>
                        </div>
                    `;
                }
            });
            
            document.getElementById('totalCount').textContent = totalVisible;
        }
        
        render();
    </script>
