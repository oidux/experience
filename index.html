    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #000000;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #2e2e2e;
            --bg-hover: #323232;
            --accent: #c9a96e;
            --accent-hover: #d4b57f;
            --accent-dark: #b39560;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --text-muted: #8a8a8a;
            --border: #3a3a3a;
            --border-light: #2e2e2e;
        }
        
        body {
            font-family: 'Archivo', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 0;
        }

        .logo-header {
            position: relative;
            z-index: 1;
            text-align: center;
            margin-bottom: 60px;
        }

        .main-logo {
            height: 60px;
            opacity: 0.9;
        }
        
        ::selection {
            background: var(--accent);
            color: var(--bg-primary);
        }

        /* Animated Background */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.03;
            background: 
                radial-gradient(circle at 20% 30%, var(--accent) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, var(--accent) 0%, transparent 50%);
            animation: gradientShift 15s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(5deg); }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Cards Grid */
        .cards-container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 32px;
        }

        .delivery-card {
            background: var(--bg-secondary);
            border: none;
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            cursor: pointer;
            animation: fadeInUp 0.6s ease-out backwards;
        }

        .delivery-card:nth-child(1) { animation-delay: 0.4s; }
        .delivery-card:nth-child(2) { animation-delay: 0.5s; }
        .delivery-card:nth-child(3) { animation-delay: 0.6s; }

        .delivery-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 0;
            display: none;
        }

        .delivery-card:hover::before {
            display: none;
        }

        .delivery-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(201, 169, 110, 0.4);
        }

        .card-header {
            padding: 32px 32px 24px;
            border-bottom: 1px solid var(--border-light);
        }

        .card-number {
            font-size: 14px;
            color: var(--accent);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.3;
            word-wrap: break-word;
        }

        .card-description {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .card-body {
            padding: 24px 32px;
        }

        .card-features {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .card-feature {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .card-feature-icon {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }

        .card-meta {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--border-light);
        }

        .card-meta-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .card-meta-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .card-meta-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--accent);
        }

        .card-cta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 16px 24px;
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Archivo';
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .card-cta:hover {
            background: var(--accent-hover);
            transform: translateX(4px);
        }

        .card-cta svg {
            transition: transform 0.3s ease;
        }

        .card-cta:hover svg {
            transform: translateX(4px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 30px 0;
            }

            .logo-header {
                margin-bottom: 40px;
            }

            .main-logo {
                height: 48px;
            }

            .cards-container {
                grid-template-columns: 1fr;
                padding: 0 24px;
                gap: 24px;
            }

            .card-header,
            .card-body {
                padding: 24px;
            }
        }
    </style>
</head>
